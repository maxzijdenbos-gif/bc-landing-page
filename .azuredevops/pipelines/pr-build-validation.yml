trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: frontend-dev
  - template: variables.yml

stages:
  - stage:
    displayName: Cache Dependencies
    jobs:
      - job: Cache
        steps:
          - template: steps/install-node.yml
          - template: steps/install-node-modules.yml

  - stage:
    displayName: Validation
    jobs:
      - job:
        displayName: Code Quality
        steps:
          - template: steps/install-node.yml
          - template: steps/install-node-modules.yml
          - template: steps/run-lockfile-lint.yml
          - template: steps/run-npm-audit.yml
          - template: steps/run-prettier.yml
          - template: steps/run-stylelint.yml
          - template: steps/run-eslint.yml
          - template: steps/run-type-check.yml

      - job:
        displayName: Testing
        steps:
          - template: steps/free-disk-space.yml
          - template: steps/install-node.yml
          - template: steps/install-node-modules.yml
          - template: steps/run-test.yml

      - job:
        displayName: Build
        steps:
          - template: steps/install-node.yml
          - template: steps/install-node-modules.yml
          - template: steps/run-build.yml
          - template: steps/run-build-storybook.yml
